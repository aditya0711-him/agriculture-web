# Docker Compose Configuration for Agriculture Web\n# Run: docker-compose up\n\nversion: '3.8'\n\nservices:\n  # Frontend Service\n  frontend:\n    build:\n      context: ./frontend\n      dockerfile: Dockerfile\n    container_name: agriculture-frontend\n    ports:\n      - \"3000:3000\"\n    environment:\n      - REACT_APP_API_URL=http://localhost:5000\n    volumes:\n      - ./frontend:/app\n      - /app/node_modules\n    depends_on:\n      - backend\n    networks:\n      - agriculture-network\n\n  # Backend Service\n  backend:\n    build:\n      context: ./backend\n      dockerfile: Dockerfile\n    container_name: agriculture-backend\n    ports:\n      - \"5000:5000\"\n    environment:\n      - NODE_ENV=development\n      - DATABASE_URL=mongodb://mongodb:27017/agriculture-web\n      - JWT_SECRET=your_jwt_secret_here\n      - PORT=5000\n    volumes:\n      - ./backend:/app\n      - /app/node_modules\n    depends_on:\n      - mongodb\n    networks:\n      - agriculture-network\n\n  # MongoDB Service\n  mongodb:\n    image: mongo:5.0\n    container_name: agriculture-mongodb\n    ports:\n      - \"27017:27017\"\n    environment:\n      MONGO_INITDB_DATABASE: agriculture-web\n    volumes:\n      - mongodb_data:/data/db\n    networks:\n      - agriculture-network\n\n  # Optional: MongoDB Express (Web UI)\n  mongo-express:\n    image: mongo-express:latest\n    container_name: agriculture-mongo-express\n    ports:\n      - \"8081:8081\"\n    environment:\n      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017\n    depends_on:\n      - mongodb\n    networks:\n      - agriculture-network\n\nvolumes:\n  mongodb_data:\n\nnetworks:\n  agriculture-network:\n    driver: bridge\n"